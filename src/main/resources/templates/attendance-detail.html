<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>勤怠詳細</title>

<style>

body{
    font-family:sans-serif;
    background-color:#f5f5f5;
}

.container{
    width:800px;
    margin:30px auto;
    border:2px solid black;
    background-color:white;
    padding:30px;
}

.title{
    display:inline-block;
    background-color:#1f3a5f;
    color:white;
    font-size:24px;
    font-weight:bold;
    padding:15px 20px;
    border-radius:5px;
    margin-bottom:25px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    width:200px;
    background-color:#dce8f5;
}

th,
td{
    border:1px solid black;
    padding:12px;
    text-align:center;
}

.button-area{
    text-align:center;
    margin-top:30px;
}

.approve-btn{
    width:120px;
    height:40px;
    background-color:#28a745;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

.approve-btn:hover{
    background-color:#218838;
}

.back-btn{
    width:180px;
    height:40px;
    background-color:#6c757d;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
    margin-left:10px;
}

.back-btn:hover{
    background-color:#5a6268;
}

</style>

</head>
<body>

<div class="container">

    <div class="title">
        ■ 勤怠詳細
    </div>

    <table>

        <tr>
            <th>社員名</th>
            <td th:text="${attendance.userName}"></td>
        </tr>

        <tr>
            <th>勤務日</th>
            <td th:text="${attendance.workDate}"></td>
        </tr>

        <tr>
            <th>出勤時間</th>
            <td th:text="${attendance.clockIn}"></td>
        </tr>

        <tr>
            <th>休憩開始</th>
            <td th:text="${attendance.breakStart}"></td>
        </tr>

        <tr>
            <th>休憩終了</th>
            <td th:text="${attendance.breakEnd}"></td>
        </tr>

        <tr>
            <th>退勤時間</th>
            <td th:text="${attendance.clockOut}"></td>
        </tr>

        <tr>
            <th>実働時間</th>
            <td th:text="${attendance.workingHours}"></td>
        </tr>

       
    </table>

    <div class="button-area">

        <form th:action="@{/admin/attendance/approve/{id}(id=${attendance.id})}"
              method="post"
              style="display:inline;">

            <button type="submit" class="approve-btn">
                承認
            </button>

        </form>

        <a th:href="@{/admin/attendance/list}">
            <button type="button" class="back-btn">
                一覧へ戻る
            </button>
        </a>

    </div>

</div>

</body>
</html>
