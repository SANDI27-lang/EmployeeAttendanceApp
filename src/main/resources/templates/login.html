<!-- 
画面名：ログイン画面
役割：ユーザー認証を行うための画面
入力項目：メールアドレス、パスワード
ボタン：ログイン
遷移先：LoginController の /login
エラー表示：認証失敗時にエラーメッセージを表示
 -->

<!DOCTYPE html>
<html>
<head>
<!-- ブラウザのタイトル -->
<title>ログイン画面</title>
<!-- 文字コード設定 -->
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<!-- Bootstrapの読み込み -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet">

</head>
<body>
	<!-- 画面全体のレイアウト -->
	<div class="container mt-5">
		<!-- カード形式でログイン画面を表示 -->
		<div class="card shadow mx-auto" style="max-width: 600px;">
			<!-- システムタイトル -->
			<div class="card-header bg-primary text-white text-center"><h3>社内勤怠管理システム</h3></div>

			<div class="card-body">
				<!-- 画面タイトル -->
				<h5 class="text-center mb-4">ログイン画面</h5>
				<!-- ログインフォーム -->
				<form method="post" action="/login">
					<!-- メールアドレス入力欄 -->
					<div class="mb-3">
						<label class="form-label">メールアドレス</label> 
						<input type="text" name="email" class="form-control" placeholder="メールアドレスを入力">
					</div>
					<!-- パスワード入力欄 -->
					<div class="mb-4">
						<label class="form-label">パスワード</label> 
						<input type="password" name="password" class="form-control" placeholder="パスワードを入力">
					</div>
					<!-- ログインボタン -->
					<div class="text-center">
						<button type="submit" class="btn btn-primary px-5">ログイン</button>
					</div>
				</form>
				<!-- ログイン失敗時のエラーメッセージ -->
				<div class="text-danger text-center mt-3" th:text="${error}"></div>
			</div>

		</div>

	</div>

</body>
</html>
